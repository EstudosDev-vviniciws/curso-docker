# Criando meu primeiro docker-compose
version: "3.8"

volumes:
  db-app:
  nosql-app:

services:
  http:
    image: nginx:stable-alpine3.24-slim
    container_name: http
    ports:
      - 8080:80
      - 8443:443
    restart: "no"

  front-end:
    container_name: front-end
    build: 
      context: ./front-end/
      dockerfile: Dockerfile.dev
      target: dev
    volumes:
      - ./front-end:/app
    ports:
      - 3000:3000
    restart: "always"

  back-end:
    container_name: back-end
    build: 
      context: ./back-end/
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./back-end:/app
    ports:
      - 3001:3000
    # restart: "on-failure"
    restart: "on-failure:5"

  db:
   #docker run --name some-postgres -e POSTGRES_PASSWORD=mysecretpassword -d postgres
    image: postgres:15.18-alpine3.24
    container_name: db
    env_file:
      - ./db/.env
    volumes:
      - db-app:/var/lib/postgresql/data
    ports:
     - 5432:5432
    restart: "unless-stopped"
  
  db-adminer:
    container_name: db-adminer
    image: adminer:4.8.1
    ports:
      - 8090:8080

  nosql:
    container_name: nosql
    image: mongo:7.0.37-jammy
    restart: always
    ports:
      - 27017:27017
    volumes:
      - nosql-app:/data/db
    env_file:
      - ./mongo/.env