# Criando meu primeiro docker-compose
version: "3.8"

networks:
  # compose_rede-app (caso o atributo name não seja definido)
  rede-app:
    name: rede-app
    driver: bridge

volumes:
  db-app:
  nosql-app:

services:
  http:
    image: nginx:stable-alpine3.24-slim
    container_name: http
    ports:
      - 8080:80
      - 8443:443
    restart: "no"
    networks:
      - rede-app
    depends_on:
      front-end:
        condition: service_started # Espera o serviço front-end iniciar antes de iniciar o serviço http
      back-end:
        condition: service_started

  front-end:
    container_name: front-end
    build: 
      context: ./front-end/
      dockerfile: Dockerfile.dev
      target: dev
    volumes:
      - ./front-end:/app
    ports:
      - 3000:3000
    restart: "always"
    networks:
      - rede-app
    depends_on:
      - back-end

  back-end:
    container_name: back-end
    build: 
      context: ./back-end/
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./back-end:/app
    ports:
      - 3001:3000
    # restart: "on-failure"
    restart: "on-failure:5"
    networks:
      - rede-app
    depends_on:
      migration:
        condition: service_completed_successfully # Espera a execução completa do serviço migration antes de iniciar o serviço back-end
      db:
        condition: service_healthy # Espera o serviço db estar saudável antes de iniciar o serviço back-end
      nosql:
        condition: service_started
      cache:
        condition: service_started
      messaging:
        condition: service_started

  migration:
    image: alpine:latest
    container_name: migration
    networks:
      - rede-app
    command: sleep 10
    depends_on:
      db:
        condition: service_started

  db:
   #docker run --name some-postgres -e POSTGRES_PASSWORD=mysecretpassword -d postgres
    image: postgres:15.18-alpine3.24
    container_name: db
    env_file:
      - ./db/.env
    volumes:
      - db-app:/var/lib/postgresql/data
    ports:
     - 5432:5432
    restart: "unless-stopped"
    networks:
      - rede-app
    healthcheck: # Monitoramento da saúde do serviço db
      test: ["CMD-SHELL", "pg_isready -U postgres"] # Comando para verificar se o banco de dados está pronto para aceitar conexões
      interval: 20s # Intervalo entre as verificações de saúde
      timeout: 5s # Tempo limite para receber uma resposta 
      retries: 5 # Numero de tentativas antes de considerar o serviço como não saudável
  
  db-adminer:
    container_name: db-adminer
    image: adminer:4.8.1
    ports:
      - 8090:8080
    networks:
      - rede-app
    depends_on:
      db:
        condition: service_healthy

  nosql:
    container_name: nosql
    image: mongo:7.0.37-jammy
    restart: always
    ports:
      - 27017:27017
    volumes:
      - nosql-app:/data/db
    env_file:
      - ./mongo/.env
    networks:
      - rede-app
  
  cache:
    container_name: cache
    image: redis:8.10-rc2-alpine3.23
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - 6379:6379
    networks:
      - rede-app

  messaging:
    container_name: messaging
    image: apache/kafka:4.3.1
    networks:
      - rede-app
    ports:
      - 9092:9092